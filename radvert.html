<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICO'S WIFI ZONE - Offre locale</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'self'; frame-src 'none'">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="refresh" content="2; url=$(link-orig)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>

<body class="state-page" data-page="radvert" data-link-orig-esc="$(link-orig-esc)" data-link-redirect-esc="$(link-redirect-esc)">
    <div class="site-shell">
        <header class="topbar" aria-label="En-tete du portail">
            <a class="brand" href="./login.html" aria-label="RICO'S WIFI ZONE">
                <span class="brand-mark">
                    <img src="assets/shield.svg" alt="">
                </span>
                <span>
                    <strong>RICO'S WIFI ZONE</strong>
                    <small>Offre locale</small>
                </span>
            </a>
            <a class="topbar-contact" href="tel:0141965069">Assistance</a>
        </header>

        <main class="state-panel">
            <div class="state-header">
                <span class="brand-mark">
                    <img src="assets/shield.svg" alt="">
                </span>
                <div>
                    <p class="eyebrow">Redirection</p>
                    <h1>Ouverture de l'offre</h1>
                    <p class="state-lead">Vous serez redirige automatiquement dans un instant.</p>
                </div>
            </div>

            <div class="message-panel">
                <p>Si rien ne se passe, ouvrez l'<a href="$(link-redirect)" target="hotspot_advert" rel="noopener noreferrer">offre manuellement</a>.</p>
            </div>
        </main>
    </div>
</body>

</html>
